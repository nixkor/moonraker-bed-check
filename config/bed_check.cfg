# bed_check.cfg — Klipper macro for the AI bed-check toggle.
# Add `[include bed_check.cfg]` to printer.cfg (place this file next to printer.cfg),
# then restart Klipper.
#
# Usage:
#   BED_CHECK            -> enable  (ENABLE defaults to 1)
#   BED_CHECK ENABLE=1   -> enable
#   BED_CHECK ENABLE=0   -> disable (e.g. internet down, printing on LAN)
#
# The flag lives in the Moonraker [bed_check] component and is persisted across
# restarts, so this just flips that switch via a remote method call. The same
# flag is also reachable from KlippyDash / the MCP, so a dashboard toggle and
# this macro drive one shared state.

[gcode_macro BED_CHECK]
description: Enable/disable the AI bed check (BED_CHECK ENABLE=0|1)
gcode:
    {% set en = params.ENABLE | default(1) | int %}
    {action_call_remote_method("set_bed_check", enabled=en)}
    {% if en %}
        RESPOND TYPE=command MSG="BedCheck: ENABLED"
    {% else %}
        RESPOND TYPE=command MSG="BedCheck: DISABLED (prints will start unchecked)"
    {% endif %}


# Print the current bed-check state to the console. Separate command (not
# `BED_CHECK STATUS`) because Klipper parses extended-command params as KEY=VALUE
# and a bare `STATUS` token is a "Malformed command". The component answers a
# tick later via RESPOND (fire-and-forget, no synchronous return into gcode).
[gcode_macro BED_CHECK_STATUS]
description: Show current AI bed-check state (enabled, model, last verdict)
gcode:
    {action_call_remote_method("bed_check_status")}


# --- the actual check trigger ------------------------------------------------
# Call CHECK_BED near the TOP of START_PRINT (after the filament check, before any
# heating/homing). The default WINDOW (25s) gives the verdict time to land before
# motion, so a bare call is safe:
#
#   ... filament-present check ...
#   CHECK_BED                  ; fire the check, then dwell 25s for the verdict
#   ... nozzle preheat, G28, bed heat, soak, probe, mesh ...
#
# WINDOW=<s> (default 25) issues a G4 dwell after firing so the bed check resolves
# before START_PRINT moves on. The component's request_timeout MUST be < WINDOW so
# a hung API call fails-closed and cancels within the dwell; order is
# request_timeout (20) < WINDOW (25) < TIMEOUT dead-man (60). WINDOW is dead time
# on every (GO) print start, so don't oversize it. WINDOW=0 disables the dwell.
# On NO-GO / error (fail-closed) / no-response the component issues CANCEL_PRINT;
# on GO it disarms the timer, the dwell finishes, and the print proceeds.
#
# NOTE: confirmed in live testing that the injected CANCEL_PRINT lands during the
# dwell, before G28 (the file-level placement lets the virtual_sdcard see the
# cancel between lines). Re-verify if you move CHECK_BED inside a macro body.

[gcode_macro CHECK_BED]
description: Fire the AI bed check; WINDOW=<s> dwells for the verdict before motion
variable_pending: 0
gcode:
    {% set timeout = params.TIMEOUT | default(60) | int %}
    {% set window = params.WINDOW | default(25) | int %}
    SET_GCODE_VARIABLE MACRO=CHECK_BED VARIABLE=pending VALUE=1
    UPDATE_DELAYED_GCODE ID=bed_check_timeout DURATION={timeout}
    {action_call_remote_method("check_bed")}
    RESPOND TYPE=command MSG="BedCheck: checking bed..."
    {% if window > 0 %}
        G4 P{window * 1000}    # dwell so the verdict (and any CANCEL) lands before motion
    {% endif %}

# Dead-man's switch: if the component never resolves the check (pending still 1
# when this fires), fail closed and cancel rather than home onto an unknown bed.
[delayed_gcode bed_check_timeout]
gcode:
    {% if printer["gcode_macro CHECK_BED"].pending %}
        RESPOND TYPE=error MSG="BedCheck: no response within timeout — cancelling print"
        CANCEL_PRINT
    {% endif %}
